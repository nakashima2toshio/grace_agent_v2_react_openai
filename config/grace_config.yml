# =============================================================================
# GRACE Agent 設定ファイル
# =============================================================================
# 環境変数での上書き: GRACE_<SECTION>_<KEY>
# 例: GRACE_LLM_MODEL=claude-haiku-4-5-20251001

version: "1.0"

# -----------------------------------------------------------------------------
# LLM設定（本プロジェクトは Anthropic を使用）
# -----------------------------------------------------------------------------
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 4096
  timeout: 30

# -----------------------------------------------------------------------------
# Embedding設定
# -----------------------------------------------------------------------------
embedding:
  provider: "gemini"
  model: "gemini-embedding-001"
  dimensions: 3072

# --------------------------------------------------------------------------------
# ツール設定
# --------------------------------------------------------------------------------
tools:
  enabled:
    - rag_search
    - web_search
    - reasoning
    - ask_user
# プロジェクト全体で恒久的に禁止するツールのリスト
  disabled:
    - write_file
    - replace
    - run_shell_command

# -----------------------------------------------------------------------------
# Confidence計算設定
# -----------------------------------------------------------------------------
confidence:
  weights:
    search_quality: 0.25
    source_agreement: 0.20
    llm_self_eval: 0.25
    tool_success: 0.15
    query_coverage: 0.15
  thresholds:
    silent: 0.9      # > 0.9: 自動実行
    notify: 0.7      # 0.7-0.9: 通知のみ
    confirm: 0.4     # 0.4-0.7: 確認要求
    # escalate: < 0.4 人間介入必須

# -----------------------------------------------------------------------------
# 介入設定
# -----------------------------------------------------------------------------
intervention:
  default_timeout: 300  # 5分
  auto_proceed_on_timeout: false
  max_clarification_rounds: 3

# -----------------------------------------------------------------------------
# リプラン設定
# -----------------------------------------------------------------------------
replan:
  max_replans: 3
  confidence_threshold: 0.4
  partial_replan_threshold: 0.6
  cooldown_seconds: 5

# -----------------------------------------------------------------------------
# コスト管理設定
# -----------------------------------------------------------------------------
cost:
  daily_limit_usd: 10.0
  hourly_limit_usd: 2.0
  per_query_limit_usd: 0.50
  warning_threshold: 0.8  # 80%で警告

# -----------------------------------------------------------------------------
# エラーハンドリング設定
# -----------------------------------------------------------------------------
error:
  max_retries: 3
  retry_delay_base: 1.0  # 秒
  retry_delay_max: 30.0
  exponential_backoff: true

# -----------------------------------------------------------------------------
# ログ設定
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/grace.log"
  max_size_mb: 100
  backup_count: 5

# -----------------------------------------------------------------------------
# Web検索設定
# -----------------------------------------------------------------------------
web_search:
  backend: "serpapi"               # "serpapi" or "duckduckgo" or "google_cse"(deprecated)
  num_results: 5
  language: "ja"
  timeout: 30                      # 秒。15 等に下げるとタイムアウト→検索0件→誤エスカレの連鎖が起きやすい
  max_retries: 3                   # タイムアウト・5xx 時の試行総数（serpapi）
  retry_backoff_seconds: 2.0       # 待機 = backoff × 試行回数（線形）
  fallback_backend: "duckduckgo"   # 主バックエンド失敗/0件時に1度だけ試す代替（""=無効）
  # SerpAPI用（backendが"serpapi"の場合に使用）
  # serpapi_api_key: ""            # 環境変数 SERPAPI_KEY 推奨
  # Google CSE用（※新規受付停止のため非推奨）
  # google_cse_api_key: ""        # 環境変数 GOOGLE_CSE_API_KEY
  # google_cse_engine_id: ""      # 環境変数 GOOGLE_CSE_ENGINE_ID

# -----------------------------------------------------------------------------
# Qdrant設定
# -----------------------------------------------------------------------------
qdrant:
  url: "http://localhost:6333"
  collection_name: "customer_support_faq"
  search_limit: 5
  score_threshold: 0.45
